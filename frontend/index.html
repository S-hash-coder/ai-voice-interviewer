<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Voice Interviewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 800px;
    background: #111827;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 90vh;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.header {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    background: #0b1220;
}

.message {
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.bot {
    background: #2563eb;
    align-self: flex-start;
}

.user {
    background: #10b981;
    align-self: flex-end;
    margin-left: auto;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    background: #3b82f6;
    color: white;
}

button:hover {
    opacity: 0.9;
}

.status {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">🎤 AI Interviewer</div>

    <div id="chat" class="chat-box"></div>

    <div class="controls">
        <button onclick="startInterview()">Start Interview</button>

        <button onclick="stopInterview()" style="background:#ef4444;">
            Stop
        </button>

        <!-- ✅ Upload Resume Button -->
        <button onclick="document.getElementById('fileInput').click()">
            Upload Resume
        </button>

        <input type="file"
               id="fileInput"
               onchange="uploadResume(this.files[0])"
               hidden>
    </div>

    <div id="status" class="status">Idle</div>

</div>

<script src="app.js"></script>

</body>
</html>
